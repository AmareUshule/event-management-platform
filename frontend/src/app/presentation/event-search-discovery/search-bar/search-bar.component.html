<div class="search-bar-container">
  <div class="p-inputgroup search-input-wrapper">
    <span class="p-inputgroup-addon search-icon-addon">
      <i class="pi pi-search search-icon"></i>
    </span>
    <input type="text" pInputText [formControl]="searchControl" placeholder="Search events, categories, organizers... (Ctrl+K)" class="search-input" />
    <span class="keyboard-shortcut-hint">Ctrl+K</span>
  </div>
</div>
