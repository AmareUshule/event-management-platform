<mat-card class="announcement-card" [routerLink]="['/internal-announcements', announcement.id]">
  <div class="card-image" *ngIf="bannerImage">
    <img [src]="bannerImage" [alt]="announcement.title">
  </div>
  
  <mat-card-header>
    <div class="header-content">
      <mat-card-title>{{ announcement.title }}</mat-card-title>
      <div class="status-badge" *ngIf="isDraft">
        <span class="draft-badge">Draft</span>
      </div>
    </div>
  </mat-card-header>

  <mat-card-content>
    <p class="content-preview">{{ announcement.content }}</p>
    
    <div class="metadata">
      <div class="author">
        <mat-icon>person</mat-icon>
        <span>{{ announcement.createdBy?.name || 'Anonymous' }}</span>
      </div>
      <div class="date">
        <mat-icon>calendar_today</mat-icon>
        <span>{{ announcement.createdAt | date:'MMM d, y' }}</span>
      </div>
    </div>
  </mat-card-content>

  <mat-card-actions align="end" (click)="$event.stopPropagation()">
    <button mat-button color="primary" [routerLink]="['/internal-announcements', announcement.id]">READ MORE</button>
    
    <ng-container *ngIf="canManage">
      <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Actions">
        <mat-icon>more_vert</mat-icon>
      </button>
      <mat-menu #menu="matMenu">
        <button mat-menu-item (click)="onEdit($event)">
          <mat-icon>edit</mat-icon>
          <span>Edit</span>
        </button>
        <button mat-menu-item *ngIf="isDraft && canPublish" (click)="onPublish($event)">
          <mat-icon>publish</mat-icon>
          <span>Approve & Publish</span>
        </button>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="onDelete($event)" class="delete-item">
          <mat-icon color="warn">delete</mat-icon>
          <span>Delete</span>
        </button>
      </mat-menu>
    </ng-container>
  </mat-card-actions>
</mat-card>
